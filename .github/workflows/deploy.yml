name: CD - Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 139.59.84.75 >> ~/.ssh/known_hosts

      - name: Execute Remote Deployment Commands
        run: |
          ssh root@139.59.84.75 << 'ENDSSH'
            set -e
            APP_DIR=/var/www/html
            REPO_URL=git@github.com:tishmalo/muthaka.git
            BRANCH="${{ github.ref_name }}"
            cd "$APP_DIR"
            
            echo "🔧 Fixing Git ownership..."
            git config --global --add safe.directory "$APP_DIR"
            
            echo "🔧 Trusting GitHub host key..."
            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts || true
            
            echo "🔧 Switching to SSH remote..."
            if [ ! -d .git ]; then
              echo "Initializing Git repository in $APP_DIR..."
              git init
            fi
            git remote remove origin 2>/dev/null || true
            git remote add origin "$REPO_URL"
            
            echo "📥 Fetching and Reseting to Origin ${{ github.ref_name }}..."
            git fetch --depth=1 origin "$BRANCH"
            git reset --hard FETCH_HEAD
            git clean -fd -e .env -e storage/
            
            echo "🧹 Manually clearing broken caches..."
            # Brute force delete because artisan commands fail when config is broken
            rm -f bootstrap/cache/*.php || true
            rm -f app/Providers/TelescopeServiceProvider.php || true
            echo "🔎 Checking Composer..."
            if ! command -v composer >/dev/null 2>&1; then
              echo "📥 Composer not found. Installing Composer..."
              EXPECTED_CHECKSUM="$(php -r 'copy("https://composer.github.io/installer.sig", "php://stdout");')"
              php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
              ACTUAL_CHECKSUM="$(php -r "echo hash_file('sha384', 'composer-setup.php');")"
              if [ "$EXPECTED_CHECKSUM" != "$ACTUAL_CHECKSUM" ]; then
                >&2 echo "ERROR: Invalid Composer installer checksum"
                rm -f composer-setup.php
                exit 1
              fi
              php composer-setup.php --install-dir=/usr/local/bin --filename=composer
              rm -f composer-setup.php
            fi
            composer --version
                        
            echo "📦 Installing production dependencies..."
            # Now safe to run because patches are in /packages
            composer install --no-dev --optimize-autoloader --no-interaction --no-progress
            
            echo "🔧 Setting permissions..."
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache
            
            echo "🚀 Running migrations..."
            php artisan migrate --force
            
            echo "🧹 Clearing and caching..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
          

            
            echo "✅ Deployment Complete!"
          ENDSSH
